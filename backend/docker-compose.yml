services:
  postgres:
    image: postgres:17
    container_name: neurolearn-postgres
    environment:
      POSTGRES_DB: neurolearn
      POSTGRES_USER: neurolearn
      POSTGRES_PASSWORD: neurolearn
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
